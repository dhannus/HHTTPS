<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HHTTPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..600,30..100,0..1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:   #F8F1E4;
  --paper:   #FCFAF5;
  --sand:    #EDE0C8;
  --sage:    #A8B89E;
  --sage-dp: #889982;
  --terra:   #C97D5B;
  --terra-dp:#A86246;
  --apricot: #F2B894;
  --lavender:#B5A8D9;
  --rose:    #DDB4B0;
  --ink:     #2D2823;
  --ink-soft:#4A413A;
  --ink-mute:#7A6F62;
  --line:    rgba(45, 40, 35, 0.1);
  --line-soft: rgba(45, 40, 35, 0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 340px;
  background: var(--cream);
  color: var(--ink);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
}

/* ── Header ── */
.header {
  padding: 14px 18px 12px;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--terra), var(--apricot));
  position: relative;
}
.logo-mark::after {
  content: 'H';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--paper);
}
.logo-text {
  font-family: 'Fraunces', serif;
  font-variation-settings: "SOFT" 100, "WONK" 1;
  font-weight: 500;
  font-size: 15px;
  color: var(--ink);
}
.url-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-mute);
  background: var(--cream);
  border: 1px solid var(--line);
  padding: 3px 8px;
  border-radius: 100px;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Status area ── */
.status-area {
  padding: 24px 18px;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
}
.status-area.verified  {
  background: linear-gradient(135deg, rgba(168, 184, 158, 0.18), var(--paper));
}
.status-area.unverified {
  background: linear-gradient(135deg, rgba(242, 184, 148, 0.18), var(--paper));
}
.status-area.machine {
  background: linear-gradient(135deg, rgba(181, 168, 217, 0.18), var(--paper));
}
.status-icon {
  font-size: 32px;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--paper);
  border-radius: 50%;
  border: 1px solid var(--line);
  flex-shrink: 0;
}
.status-info { flex: 1; min-width: 0; }
.status-label {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 2px;
  color: var(--ink);
}
.status-label.green  { color: var(--sage-dp); }
.status-label.amber  { color: var(--terra-dp); }
.status-label.muted  { color: var(--ink-mute); }
.status-sub {
  font-size: 12px;
  color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
}

/* ── Trust score ── */
.trust-section {
  padding: 16px 18px;
  background: var(--cream);
  border-bottom: 1px solid var(--line-soft);
  display: none;
}
.trust-section.show { display: block; }
.trust-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.trust-label {
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.trust-value {
  font-family: 'Fraunces', serif;
  font-variation-settings: "SOFT" 100;
  font-weight: 500;
  font-size: 16px;
  color: var(--ink);
}
.trust-bar {
  height: 6px;
  background: var(--sand);
  border-radius: 3px;
  overflow: hidden;
}
.trust-fill {
  height: 100%;
  background: var(--terra);
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}
.trust-fill.mid  { background: var(--apricot); }
.trust-fill.high { background: var(--sage-dp); }

/* ── Role card ── */
.role-card {
  padding: 14px 18px;
  background: var(--paper);
  border-bottom: 1px solid var(--line-soft);
  display: none;
}
.role-card.show { display: block; }
.role-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.role-icon {
  font-size: 24px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cream);
  border-radius: 50%;
  flex-shrink: 0;
}
.role-info { flex: 1; min-width: 0; }
.role-name {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 15px;
  color: var(--ink);
  margin-bottom: 1px;
}
.role-level {
  font-size: 11px;
  color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}

.privileges {
  border-top: 1px solid var(--line-soft);
  padding-top: 10px;
  margin-top: 4px;
}
.priv {
  font-size: 12px;
  color: var(--ink-soft);
  padding: 4px 0 4px 18px;
  position: relative;
  line-height: 1.4;
}
.priv::before {
  content: '✓';
  position: absolute;
  left: 0;
  color: var(--sage-dp);
  font-weight: 600;
  font-size: 11px;
}

/* ── Details ── */
.details {
  padding: 14px 18px;
  background: var(--cream);
  display: none;
}
.details.show { display: block; }
.details h4 {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 10px;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}
.dr {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 6px 0;
  border-bottom: 1px solid var(--line-soft);
  font-size: 12px;
}
.dr:last-child { border-bottom: none; }
.dk {
  color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.dv {
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-align: right;
  word-break: break-all;
}
.dv.g { color: var(--sage-dp); font-weight: 500; }
.dv.a { color: var(--terra-dp); font-weight: 500; }

/* ── Actions ── */
.actions {
  padding: 14px 18px 16px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  display: flex;
  gap: 8px;
  flex-direction: column;
}
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 100px;
  border: none;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--ink);
  color: var(--cream);
}
.btn-primary:hover { background: var(--terra-dp); }
.btn-secondary {
  background: var(--cream);
  color: var(--ink);
  border: 1px solid var(--line);
}
.btn-secondary:hover { background: var(--sand); }
.btn-revoke {
  background: transparent;
  color: var(--terra-dp);
  border: 1px solid var(--terra);
  display: none;
}
.btn-revoke.show { display: flex; }
.btn-revoke:hover { background: var(--terra); color: var(--paper); }

/* ── Empty state ── */
.no-hhttps {
  display: none;
  padding: 20px 18px;
  text-align: center;
  background: var(--cream);
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.6;
}
.no-hhttps p { margin-bottom: 12px; }
.no-hhttps a {
  color: var(--terra-dp);
  text-decoration: underline;
  text-decoration-color: rgba(168, 98, 70, 0.3);
}

/* ── Footer ── */
.footer {
  padding: 10px 18px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 10px;
  color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
}
.footer a {
  color: var(--ink-soft);
  text-decoration: none;
}
.footer a:hover { color: var(--terra-dp); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark"></div>
    <div class="logo-text">HHTTPS</div>
  </div>
  <div class="url-chip" id="headerUrl">—</div>
</div>

<div class="status-area" id="statusArea">
  <div class="status-icon" id="statusIcon">🔒</div>
  <div class="status-info">
    <div class="status-label muted" id="statusLabel">Wird geprüft…</div>
    <div class="status-sub" id="statusSub">—</div>
  </div>
</div>

<div class="trust-section" id="trustSection">
  <div class="trust-row">
    <span class="trust-label">Trust-Score</span>
    <span class="trust-value" id="trustValue">0/100</span>
  </div>
  <div class="trust-bar">
    <div class="trust-fill" id="trustFill"></div>
  </div>
</div>

<div class="role-card" id="roleCard">
  <div class="role-row">
    <div class="role-icon" id="roleIcon">🧑</div>
    <div class="role-info">
      <div class="role-name" id="roleName">—</div>
      <div class="role-level" id="roleLevel">—</div>
    </div>
  </div>
  <div class="privileges" id="rolePrivileges"></div>
</div>

<div class="details" id="details">
  <h4>Token-Details</h4>
  <div class="dr"><span class="dk">Status</span>     <span class="dv" id="dStatus">—</span></div>
  <div class="dr"><span class="dk">Mensch</span>     <span class="dv" id="dHuman">—</span></div>
  <div class="dr"><span class="dk">Methode</span>    <span class="dv" id="dMethod">—</span></div>
  <div class="dr"><span class="dk">Issuer</span>     <span class="dv" id="dIssuer">—</span></div>
  <div class="dr" id="dTokenRow" style="display:none">
    <span class="dk">Token</span><span class="dv" id="dToken">—</span>
  </div>
</div>

<div class="actions">
  <a href="https://hhttps.org" target="_blank" class="btn btn-primary">Bei hhttps.org verifizieren →</a>
  <a href="https://iamhmn.org" target="_blank" class="btn btn-secondary">Was ist HHTTPS?</a>
  <button id="revokeBtn" class="btn btn-revoke">Token widerrufen</button>
</div>

<div class="no-hhttps" id="noHHTTPS">
  <p>Diese Website unterstützt HHTTPS noch nicht.</p>
  <p><a href="https://hhttps.org" target="_blank">Mehr über das Protokoll →</a></p>
</div>

<div class="footer">
  <span>v1.1.0 · HHTTPS 0.4.1</span>
  <a href="https://github.com/dhannus/HumanProof" target="_blank">GitHub →</a>
</div>

<script src="popup.js"></script>
</body>
</html>
