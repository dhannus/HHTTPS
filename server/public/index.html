<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F9F9F8">
<title>iamhmn — Beweise, dass du ein Mensch bist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F9F9F8; --surface:#FFFFFF; --ink:#0A0A0A; --ink-2:#5C5C5C;
  --line:#8A8A8A; --line-subtle:#E6E6E4; --focus:#0A0A0A;
  --font-display:'Syne',system-ui,sans-serif;
  --font-ui:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --r-card:24px; --r-input:16px; --r-pill:999px;
  --sh-sm:0 1px 2px rgba(10,10,10,.05);
  --sh-md:0 4px 16px rgba(10,10,10,.08);
  --sh-lg:0 12px 40px rgba(10,10,10,.10);
  --ease:cubic-bezier(.22,1,.36,1);
  --col:420px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-ui);
  font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;display:flex;flex-direction:column}
a{color:inherit}
.wrap{flex:1;width:100%;max-width:100%;margin:0 auto;
  padding:24px clamp(20px,5vw,72px) 80px;display:flex;flex-direction:column}
.top{display:flex;align-items:center;justify-content:space-between;padding:8px 0 40px}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);
  font-weight:800;font-size:22px;letter-spacing:-.02em}
.brand .dot{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--ink);
  position:relative;flex:none}
.brand .dot::after{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--ink)}
.brand .v{background:linear-gradient(90deg,#1C6CA8 0%,#0A7C99 30%,#93C5FD 60%,#1C6CA8 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;animation:shimmer 6s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:100% center}}
.lang{font-family:var(--font-mono);font-size:13px;font-weight:500;background:none;
  border:1.5px solid var(--line-subtle);border-radius:var(--r-pill);
  padding:6px 14px;cursor:pointer;color:var(--ink);transition:border-color .16s var(--ease)}
.lang:hover{border-color:var(--ink)}
.hero{margin-bottom:36px}
.hero h1{font-family:var(--font-display);font-weight:800;
  font-size:clamp(2.6rem,9vw,3.4rem);line-height:1.04;letter-spacing:-.02em;margin-bottom:18px}
.hero h1 .em{background:linear-gradient(100deg,#0A7C99 0%,#B05A1E 32%,#FFD9A8 50%,#B05A1E 68%,#0A7C99 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;animation:shimmer 6.5s ease-in-out infinite}
.hero p{color:var(--ink-2);font-size:1.0625rem;max-width:36ch}
.progress{display:flex;align-items:center;gap:10px;margin:0 0 22px;min-height:24px;
  font-size:14px;color:var(--ink-2)}
.progress .ticks{display:flex;gap:6px}
.tick{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--line);transition:all .3s var(--ease)}
.tick.on{background:var(--ink);border-color:var(--ink)}
.progress.hidden{display:none}
.methods{display:flex;flex-direction:column;gap:12px}
/* Full-width layout: on wider screens the hero fills the left half and the
   stacked sign-in column sits on the right, using the whole screen. The
   accordion panels keep working because the methods column stays a flex column.
   On mobile everything stacks into a single calm column. */
@media (min-width:880px){
  .layout{display:grid;grid-template-columns:1.05fr 1fr;
    gap:clamp(36px,6vw,110px);align-items:center;
    max-width:1500px;margin:0 auto;width:100%}
  .hero{margin-bottom:0}
  .hero h1{font-size:clamp(3rem,4.6vw,4.8rem)}
  .authcol{width:100%;max-width:520px;margin-left:auto}
}
.m-btn{display:flex;align-items:center;gap:14px;width:100%;min-height:60px;padding:0 22px;
  background:var(--surface);color:var(--ink);border:1.5px solid var(--line-subtle);
  border-radius:var(--r-pill);font-family:var(--font-ui);font-size:1rem;font-weight:600;
  cursor:pointer;text-align:left;box-shadow:var(--sh-sm);
  transition:transform .16s var(--ease),box-shadow .16s var(--ease),border-color .16s var(--ease)}
.m-btn:hover{transform:translateY(-1px);box-shadow:var(--sh-md);border-color:var(--ink)}
.m-btn:active{transform:scale(.985)}
.m-btn:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.m-btn[disabled]{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.m-btn .ic{width:26px;height:26px;flex:none;display:flex;align-items:center;justify-content:center}
.m-btn .ic svg{width:24px;height:24px;stroke:var(--ink);fill:none;stroke-width:1.7}
.m-btn .lbl{flex:1}
.m-btn .sub{display:block;font-weight:400;font-size:12.5px;color:var(--ink-2);margin-top:1px}
.m-btn .state{font-family:var(--font-mono);font-size:12px;color:var(--ink-2)}
.m-btn.done{border-color:var(--ink)}
.m-btn .check{width:22px;height:22px;flex:none;color:var(--ink)}
.panel{margin-top:12px;background:var(--surface);border:1.5px solid var(--line-subtle);
  border-radius:var(--r-card);padding:18px;box-shadow:var(--sh-sm);animation:rise .35s var(--ease)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel.hidden{display:none}
.field{width:100%;min-height:52px;padding:0 18px;font-family:var(--font-ui);font-size:1rem;
  color:var(--ink);background:var(--bg);border:1.5px solid var(--line-subtle);
  border-radius:var(--r-input);transition:border-color .16s var(--ease)}
.field:focus{outline:none;border-color:var(--ink)}
.field::placeholder{color:#9a9a98}
.row{display:flex;gap:10px;margin-top:10px}
.go{min-height:52px;padding:0 22px;background:var(--ink);color:#fff;border:none;
  border-radius:var(--r-pill);font-family:var(--font-ui);font-weight:600;font-size:.95rem;
  cursor:pointer;white-space:nowrap;transition:opacity .16s var(--ease),transform .16s var(--ease)}
.go:hover{transform:translateY(-1px)}
.go:active{transform:scale(.98)}
.go:disabled{opacity:.4;cursor:not-allowed;transform:none}
.go.ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
.hint{font-size:13px;color:var(--ink-2);margin-top:10px;line-height:1.45}
.qr{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:6px}
.qr-frame{position:relative;padding:9px;border-radius:20px;
  background:linear-gradient(120deg,#1C6CA8,#0A7C99,#93C5FD,#B05A1E,#6E5AA8,#1C6CA8);
  background-size:300% 300%;animation:qrflow 6s ease-in-out infinite;
  box-shadow:0 6px 24px -8px rgba(10,10,10,.25)}
@keyframes qrflow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.qr-frame img{display:block;width:188px;height:188px;border-radius:12px;border:3px solid #fff;background:#fff}
.qr-frame .sp{position:absolute;font-size:15px;color:#fff;pointer-events:none;
  text-shadow:0 0 7px rgba(255,255,255,.9);animation:twinkle 2.4s ease-in-out infinite}
.qr-frame .s1{top:-7px;left:-5px;animation-delay:0s}
.qr-frame .s2{top:-7px;right:-5px;animation-delay:.6s}
.qr-frame .s3{bottom:-7px;left:-5px;animation-delay:1.2s}
.qr-frame .s4{bottom:-7px;right:-5px;animation-delay:1.8s}
@keyframes twinkle{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}
.issue-wrap{margin-top:22px}
.issue{width:100%;min-height:60px;background:var(--ink);color:#fff;border:none;
  border-radius:var(--r-pill);font-family:var(--font-ui);font-weight:700;font-size:1.05rem;
  cursor:pointer;box-shadow:var(--sh-md);transition:transform .16s var(--ease),opacity .16s}
.issue:hover{transform:translateY(-1px)}
.issue:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.tokenCard{margin-top:18px;background:var(--surface);border:1.5px solid var(--ink);
  border-radius:var(--r-card);padding:22px;box-shadow:var(--sh-lg);animation:rise .4s var(--ease)}
.tokenCard.hidden{display:none}
.tokenCard .h{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem;margin-bottom:6px}
.tokenCard .h svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:2.4}
.tokenCard .raw{font-family:var(--font-mono);font-size:12px;color:var(--ink-2);word-break:break-all;
  background:var(--bg);border-radius:12px;padding:12px;margin-top:10px;line-height:1.6}
.privacy{margin-top:28px;font-size:13px;color:var(--ink-2);display:flex;gap:8px;
  align-items:center;justify-content:center;text-align:center}
.privacy svg{width:15px;height:15px;stroke:var(--ink-2);fill:none;stroke-width:1.7;flex:none}
.foot{margin-top:auto;padding-top:40px;font-size:12px;color:var(--ink-2);
  display:flex;gap:16px;justify-content:center;font-family:var(--font-mono)}
.foot a{text-decoration:none;opacity:.8}.foot a:hover{opacity:1}
@media (prefers-reduced-motion:reduce){*{animation-duration:0ms!important;transition-duration:0ms!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="dot"></span><span class="v">iamhmn</span></div>
    <button class="lang" id="langBtn" onclick="toggleLang()" aria-label="Sprache wechseln">EN</button>
  </div>

  <div class="layout">
  <div class="hero">
    <h1></h1>
    <p data-i18n="hero.p"></p>
  </div>

  <div class="authcol">
  <div class="progress hidden" id="progress" aria-live="polite">
    <span id="progressLabel"></span>
    <span class="ticks" id="ticks"></span>
  </div>

  <div class="methods" id="methods">
    <button class="m-btn" id="m-email" onclick="pick('email')">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m4 7 8 6 8-6"/></svg></span>
      <span class="lbl"><span data-i18n="m.email"></span><span class="sub" data-i18n="m.email.sub"></span></span>
      <span class="state" id="st-email"></span>
    </button>
    <div class="panel hidden" id="panel-email">
      <input class="field" id="emailInput" type="email" autocomplete="email" inputmode="email" placeholder="name@example.com" aria-label="E-Mail">
      <div class="row"><button class="go" id="emailSend" onclick="emailStart()" style="flex:1" data-i18n="email.send"></button></div>
      <div class="hidden" id="emailCodeRow">
        <input class="field" id="emailCode" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="••••••" aria-label="Code" style="margin-top:10px">
        <div class="row"><button class="go" id="emailVerify" onclick="emailConfirm()" style="flex:1" data-i18n="email.verify"></button></div>
      </div>
      <div class="hint" id="emailHint"></div>
    </div>

    <button class="m-btn" id="m-passkey" onclick="pick('passkey')">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="8" cy="10" r="4"/><path d="M8 14v6m0-3h3m8-7-4 4m0 0 2 2m-2-2 2-2"/></svg></span>
      <span class="lbl"><span data-i18n="m.passkey"></span><span class="sub" data-i18n="m.passkey.sub"></span></span>
      <span class="state" id="st-passkey"></span>
    </button>
    <div class="panel hidden" id="panel-passkey">
      <div class="hint" data-i18n="passkey.hint"></div>
      <div class="row"><button class="go" id="passkeyGo" onclick="passkeyRun()" style="flex:1" data-i18n="passkey.go"></button></div>
      <div class="hint" id="passkeyHint"></div>
    </div>

    <button class="m-btn" id="m-eudi" onclick="pick('eudi')">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="3"/><path d="M3 10h18M16 14.5h2"/></svg></span>
      <span class="lbl"><span data-i18n="m.eudi"></span><span class="sub" data-i18n="m.eudi.sub"></span></span>
      <span class="state" id="st-eudi"></span>
    </button>
    <div class="panel hidden" id="panel-eudi">
      <div class="hint" data-i18n="eudi.hint"></div>
      <div class="qr" id="eudiQrWrap" style="display:none">
        <div class="qr-frame">
          <span class="sp s1">✦</span><span class="sp s2">✦</span><span class="sp s3">✦</span><span class="sp s4">✦</span>
          <img id="eudiQr" alt="EUDI-Wallet QR-Code">
        </div>
        <a class="go ghost" id="eudiLink" href="#" style="text-decoration:none" data-i18n="eudi.open"></a>
      </div>
      <div id="eudiStartRow">
        <button class="go" id="eudiGo" onclick="eudiRun()" style="width:100%" data-i18n="eudi.go"></button>
      </div>
      <div class="hint" id="eudiHint"></div>
    </div>

    <button class="m-btn" id="m-age" onclick="pick('age')">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3l2.2 4.5 5 .7-3.6 3.5.85 4.95L12 14.8l-4.45 2.35.85-4.95L4.8 8.2l5-.7L12 3Z"/><path d="M6.5 20.5h11"/></svg></span>
      <span class="lbl"><span data-i18n="m.age"></span><span class="sub" data-i18n="m.age.sub"></span></span>
      <span class="state" id="st-age"></span>
    </button>
    <div class="panel hidden" id="panel-age">
      <div class="hint" data-i18n="age.hint"></div>
      <div class="qr" id="ageQrWrap" style="display:none">
        <div class="qr-frame">
          <span class="sp s1">✦</span><span class="sp s2">✦</span><span class="sp s3">✦</span><span class="sp s4">✦</span>
          <img id="ageQr" alt="EUDI-Wallet Alters-QR-Code">
        </div>
        <a class="go ghost" id="ageLink" href="#" style="text-decoration:none" data-i18n="eudi.open"></a>
      </div>
      <div id="ageStartRow" style="display:flex;gap:8px">
        <button class="go ghost" onclick="ageRun(14)" style="flex:1" data-i18n="age.14"></button>
        <button class="go ghost" onclick="ageRun(16)" style="flex:1" data-i18n="age.16"></button>
        <button class="go" onclick="ageRun(18)" style="flex:1" data-i18n="age.18"></button>
      </div>
      <div class="hint" id="ageHint"></div>
    </div>

    <button class="m-btn" id="m-github" onclick="pick('github')">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24" stroke-width="0"><path fill="#0A0A0A" d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.84c.85 0 1.71.12 2.51.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.6.69.49A10.02 10.02 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z"/></svg></span>
      <span class="lbl"><span data-i18n="m.github"></span><span class="sub" data-i18n="m.github.sub"></span></span>
      <span class="state" id="st-github"></span>
    </button>
    <div class="panel hidden" id="panel-github">
      <div class="hint" data-i18n="github.hint"></div>
      <div class="row"><button class="go" id="githubGo" onclick="githubRun()" style="flex:1" data-i18n="github.go"></button></div>
    </div>

    <button class="m-btn" id="m-machine" onclick="pick('machine')">
      <span class="ic" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V4m-1.5 0h3M8.5 13h.01M15.5 13h.01M9.5 16h5"/><path d="M2 13v2m20-2v2"/></svg></span>
      <span class="lbl"><span data-i18n="m.machine"></span><span class="sub" data-i18n="m.machine.sub"></span></span>
      <span class="state" id="st-machine"></span>
    </button>
    <div class="panel hidden" id="panel-machine">
      <div class="hint" data-i18n="machine.hint"></div>
      <input class="field" id="machineRole" type="text" autocomplete="off" aria-label="Rolle / Aufgabe" style="margin-top:4px">
      <div class="row"><button class="go" id="machineGo" onclick="machineRun()" style="flex:1" data-i18n="machine.go"></button></div>
      <div class="hint" id="machineHint"></div>
      <div class="hint" id="machineKey" style="display:none;font-family:var(--font-mono);word-break:break-all"></div>
    </div>
  </div>

  <div class="issue-wrap">
    <button class="issue" id="issueBtn" onclick="issueToken()" disabled data-i18n="issue.btn"></button>
    <div class="tokenCard hidden" id="tokenCard">
      <div class="h"><svg viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg><span data-i18n="token.done"></span></div>
      <div id="tokenMethods" style="font-size:14px;color:var(--ink-2)"></div>
      <div class="raw" id="tokenRaw"></div>

  </div>

  <div class="privacy">
    <svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3Z"/></svg>
    <span data-i18n="privacy"></span>
  </div>

  </div></div>
  <div class="foot">
    <a href="https://hhttps.org" data-i18n="foot.about"></a>
    <a href="https://github.com/dhannus/HHTTPS">GitHub</a>
    <a href="https://hhttps.org/.well-known/hhttps-role-assurance" data-i18n="foot.proto"></a>
  </div>
</div>

function tr(k){return (T[LANG]&&T[LANG][k])||k}
function applyLang(){
  document.documentElement.lang=LANG;
  document.getElementById('langBtn').textContent=LANG==='de'?'EN':'DE';
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=tr(el.getAttribute('data-i18n'))});
  document.querySelector('.hero h1').innerHTML=tr('hero.a')+' <span class="em">'+tr('hero.em')+'</span>'+tr('hero.b');
  const mr=document.getElementById('machineRole'); if(mr) mr.placeholder=tr('machine.role.ph');
  renderProgress();
}
function toggleLang(){LANG=LANG==='de'?'en':'de';localStorage.setItem('iamhmn-lang',LANG);applyLang()}

const PANELS=['email','passkey','eudi','github','machine','age'];
function pick(m){
  if(confirmed[m])return;
  PANELS.forEach(x=>{const p=document.getElementById('panel-'+x);if(p)p.classList.toggle('hidden',x!==m)});
  const f=document.querySelector('#panel-'+m+' .field, #panel-'+m+' .go');if(f)setTimeout(()=>f.focus(),60);
}
function renderProgress(){
  const n=ORDER.filter(m=>confirmed[m]).length;
  const prog=document.getElementById('progress'),ticks=document.getElementById('ticks'),label=document.getElementById('progressLabel');
  if(n===0){prog.classList.add('hidden');return}
  prog.classList.remove('hidden');
  label.textContent=n===1?tr('progress.one'):(n+tr('progress.more'));
  ticks.innerHTML=ORDER.map(m=>`<span class="tick ${confirmed[m]?'on':''}"></span>`).join('');
}
function markConfirmed(m){
  confirmed[m]=true;
  document.getElementById('m-'+m).classList.add('done');
  document.getElementById('panel-'+m)?.classList.add('hidden');
  document.getElementById('st-'+m).innerHTML='<span class="check"><svg viewBox="0 0 24 24" fill="none"><path d="m5 13 4 4L19 7" stroke="currentColor" stroke-width="2.4"/></svg></span>';
  document.getElementById('issueBtn').disabled=false;
  renderProgress();
}

/* ── Session bootstrap ─────────────────────────────────────────────────────
   Any method may be first. session/start mints a method-neutral session;
   email & passkey also create one. GitHub/EUDI need a session to exist. */
let pkUserId=null;
async function ensureSession(){
  if(sessionId) return sessionId;
  const r=await fetch(API+'/hhttps/session/start',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({})});
  const d=await r.json(); if(!r.ok)throw 0;
  sessionId=d.sessionId; return sessionId;
}

/* EMAIL — ensureSession -> email/send -> email/confirm-code */
async function emailStart(){
  const email=document.getElementById('emailInput').value.trim();
  const hint=document.getElementById('emailHint');
  if(!/.+@.+\..+/.test(email)){hint.textContent=tr('err');return}
  try{
    await ensureSession();
    const r=await fetch(API+'/hhttps/email/send',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sessionId,email})});
    const d=await r.json(); if(!r.ok)throw 0;
    document.getElementById('emailCodeRow').classList.remove('hidden');
    hint.textContent=tr('codeSent'); document.getElementById('emailCode').focus();
  }catch(e){hint.textContent=tr('err')}
}
async function emailConfirm(){
  const code=document.getElementById('emailCode').value.trim();
  const hint=document.getElementById('emailHint');
  try{
    const r=await fetch(API+'/hhttps/email/confirm-code',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sessionId,code})});
    const d=await r.json(); if(!r.ok)throw 0;
    markConfirmed('email');
  }catch(e){hint.textContent=tr('err')}
}

/* PASSKEY — register(start->finish) then auth(start->finish). auth/finish
   creates the session and merges our prior one via priorSessionId. */
async function passkeyRun(){
  const hint=document.getElementById('passkeyHint');
  const L=window.SimpleWebAuthnBrowser;
  if(!L){hint.textContent='WebAuthn lib missing';return}
  try{
    const rs=await fetch(API+'/hhttps/webauthn/register/start',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(pkUserId?{userId:pkUserId}:{})});
    const ro=await rs.json(); if(!rs.ok)throw 0;
    pkUserId=ro.userId;
    const regResp=await L.startRegistration(ro.options);
    const rf=await fetch(API+'/hhttps/webauthn/register/finish',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({userId:pkUserId,response:regResp})});
    if(!rf.ok)throw 0;
    const as=await fetch(API+'/hhttps/webauthn/auth/start',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({userId:pkUserId})});
    const ao=await as.json(); if(!as.ok)throw 0;
    const authResp=await L.startAuthentication(ao.options);
    const af=await fetch(API+'/hhttps/webauthn/auth/finish',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sessionId:ao.sessionId,response:authResp,priorSessionId:sessionId})});
    const d=await af.json(); if(!af.ok)throw 0;
    sessionId=d.sessionId;
    markConfirmed('passkey');
  }catch(e){hint.textContent=tr('err')}
}

/* EUDI — needs a session; eid/request -> poll eid/status/:requestId */
async function eudiRun(){
  const hint=document.getElementById('eudiHint');
  try{
    await ensureSession();
    const r=await fetch(API+'/eudi/eid/request',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({hhttpsSession:sessionId})});
    const d=await r.json(); if(!r.ok||!d.deepLink)throw 0;
    const qr=qrcode(0,'L');qr.addData(d.deepLink);qr.make();
    document.getElementById('eudiQr').src=qr.createDataURL(4,8);
    document.getElementById('eudiLink').href=d.deepLink;
    document.getElementById('eudiQrWrap').style.display='flex';
    document.getElementById('eudiStartRow').style.display='none';
    pollEudi(d.requestId);
  }catch(e){hint.textContent=tr('err')}
}
async function pollEudi(requestId){
  for(let i=0;i<80;i++){await new Promise(r=>setTimeout(r,2500));
    try{const r=await fetch(API+'/eudi/eid/status/'+encodeURIComponent(requestId));
      const d=await r.json(); if(d.status==='verified'){markConfirmed('eudi');return}}catch(e){}}
}

/* AGE — equal 6th entry. Some users only want to prove their age. EUDI Wallet
   age_over_NN, minAge in {14,16,18}. Orthogonal & trust-neutral: confirming an
   age threshold does NOT mint a human token on its own (matches the backend). */
async function ageRun(minAge){
  const hint=document.getElementById('ageHint');
  try{
    await ensureSession();
    const r=await fetch(API+'/eudi/age/request',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({hhttpsSession:sessionId,minAge})});
    const d=await r.json(); if(!r.ok||!d.deepLink)throw 0;
    const qr=qrcode(0,'L');qr.addData(d.deepLink);qr.make();
    document.getElementById('ageQr').src=qr.createDataURL(4,8);
    document.getElementById('ageLink').href=d.deepLink;
    document.getElementById('ageQrWrap').style.display='flex';
    document.getElementById('ageStartRow').style.display='none';
    hint.textContent=tr('age.waiting');
    pollAge(d.requestId,minAge);
  }catch(e){hint.textContent=tr('err')}
}
async function pollAge(requestId,minAge){
  for(let i=0;i<80;i++){await new Promise(r=>setTimeout(r,2500));
    try{const r=await fetch(API+'/eudi/age/status/'+encodeURIComponent(requestId));
      const d=await r.json(); if(d.status==='verified'){ageConfirmed(minAge);return}}catch(e){}}
}
function ageConfirmed(minAge){
  confirmed.age=true;
  document.getElementById('m-age').classList.add('done');
  document.getElementById('st-age').textContent='✓ '+minAge+'+';
  document.getElementById('ageHint').textContent=tr('age.done').replace('{n}',minAge);
}

/* GITHUB — needs a session; popup verify/github/start?session=, poll status */
async function githubRun(){
  try{
    await ensureSession();
    window.open(API+'/hhttps/verify/github/start?session='+encodeURIComponent(sessionId),'_blank','width=600,height=720');
    pollGithub();
  }catch(e){}
}
async function pollGithub(){
  for(let i=0;i<80;i++){await new Promise(r=>setTimeout(r,2500));
    try{const r=await fetch(API+'/hhttps/verify/github/status',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sessionId})});
      const d=await r.json(); if(d.verified){markConfirmed('github');return}}catch(e){}}
}

/* MACHINE — honest bot declaration -> machine apiKey (NOT a human token) */
async function machineRun(){
  const role=document.getElementById('machineRole').value.trim();
  const hint=document.getElementById('machineHint');
  try{
    const r=await fetch(API+'/hhttps/machine/register',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({operatorName:role||'AI agent',purpose:role||'AI/bot identity declaration',role:role||undefined})});
    const d=await r.json(); if(!r.ok)throw 0;
    confirmed.machine=true;
    document.getElementById('m-machine').classList.add('done');
    document.getElementById('st-machine').textContent='\uD83E\uDD16';
    document.getElementById('machineRole').style.display='none';
    document.getElementById('machineGo').parentElement.style.display='none';
    hint.textContent=tr('machine.done');
    if(d.apiKey){const k=document.getElementById('machineKey');k.style.display='block';k.textContent=tr('machine.key')+' '+d.apiKey}
  }catch(e){hint.textContent=tr('err')}
}

/* ISSUE TOKEN — role/declare {sessionId} once >=1 human method confirmed */
async function issueToken(){
  const btn=document.getElementById('issueBtn');btn.disabled=true;
  try{
    const r=await fetch(API+'/hhttps/role/declare',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sessionId})});
    const d=await r.json(); if(!r.ok)throw 0;
    const card=document.getElementById('tokenCard');card.classList.remove('hidden');
    document.getElementById('tokenMethods').textContent=(LANG==='de'?'Methoden: ':'Methods: ')+ORDER.filter(m=>confirmed[m]).join(' \u00b7 ');
    const tok=d.hhttps&&d.hhttps.token;
    if(tok){const p=tok.split('.');document.getElementById('tokenRaw').textContent=p[0]+'.'+p[1]+'.'+(p[2]||'').slice(0,16)+'\u2026'}
    card.scrollIntoView({behavior:'smooth',block:'center'});
  }catch(e){btn.disabled=false}
}

applyLang();
</script>
