# HHTTPS Phase 3 — Official EU Verifier Endpoint backend
#
# Image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint (v0.9.0+)
# NOTE: this image uses VERIFIER_ACCESS_CERTIFICATE_* env names for the JAR
# signing keystore (NOT VERIFIER_JAR_SIGNING_KEY_* — that's the older
# ...-23220-4-kt repo variant). Verified against the official repo README.
#
# Start:  cd server/eudi-verifier/docker && docker compose up -d
# Logs:   docker compose logs --tail 50 verifier

services:
  verifier:
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint:latest
    container_name: eudi-verifier-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # PKCS12 keystore (RP private key + access certificate), read-only.
      - /var/www/hhttps/eudi-keys/rp-access.p12:/keystore.p12:ro
    environment:
      SERVER_PORT: "8080"
      VERIFIER_PUBLICURL: "https://hhttps.org/eudi-backend"

      # RP authentication: sign Authorization Requests (JAR) with our access cert.
      # client_id becomes "x509_san_dns:hhttps.org" — matches SAN DNS:hhttps.org.
      VERIFIER_CLIENTIDPREFIX: "x509_san_dns"
      VERIFIER_ORIGINALCLIENTID: "hhttps.org"

      # CORRECT keystore variables for THIS image (VERIFIER_ACCESS_CERTIFICATE_*):
      VERIFIER_ACCESS_CERTIFICATE_SIGNING_ALGORITHM: "ES256"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE: "file:///keystore.p12"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_TYPE: "pkcs12"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_PASSWORD: "Acepthanu231079"
      VERIFIER_ACCESS_CERTIFICATE_ALIAS: "access_certificate"
      VERIFIER_ACCESS_CERTIFICATE_PASSWORD: "Acepthanu231079"

      VERIFIER_REQUESTJWT_EMBED: "ByReference"
      VERIFIER_RESPONSE_MODE: "DirectPost"
      VERIFIER_CLIENTMETADATA_VPFORMATS_MSOMDOC_ENABLED: "true"
      CORS_ORIGINS: "https://hhttps.org"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
